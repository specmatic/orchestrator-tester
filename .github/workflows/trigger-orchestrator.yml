name: Build and Trigger Orchestrator

on:
  workflow_dispatch:
    inputs:
      orchestrator_repository:
        description: Repository that hosts the orchestrator workflow
        required: false
        default: specmatic/specmatic-tests-orchestrator
        type: string
      orchestrator_event_type:
        description: repository_dispatch event type to send
        required: false
        default: specmatic-enterprise-jar-ready
        type: string
      ORCHESTRATOR_TEST_EXECUTOR_PATH:
        description: Optional manifest path for orchestrator scenario testing
        required: false
        type: string

jobs:
  build-and-trigger:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    permissions:
      checks: write
      contents: write
    steps:
      - name: Checkout orchestrator-tester
        uses: actions/checkout@v5

      - name: Create pending orchestrator check
        id: pending-check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          response=$(gh api repos/${GITHUB_REPOSITORY}/check-runs -X POST \
            -f name="Orchestrator Gate" \
            -f head_sha="${GITHUB_SHA}" \
            -f status="in_progress" \
            -f details_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            -f output[title]="Orchestrator Gate" \
            -f output[summary]="Waiting for orchestrator callback.")
          check_run_id=$(python3 -c 'import json,sys; print(json.loads(sys.stdin.read())["id"])' <<<"$response")
          check_run_url=$(python3 -c 'import json,sys; print(json.loads(sys.stdin.read())["html_url"])' <<<"$response")
          echo "check_run_id=$check_run_id" >> "$GITHUB_OUTPUT"
          echo "check_run_url=$check_run_url" >> "$GITHUB_OUTPUT"
          echo "Created pending check run: $check_run_url"
          {
            echo "## Orchestrator Gate"
            echo ""
            echo "- Pending check: [$check_run_id]($check_run_url)"
            echo "- Status: in_progress"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Build jar
        run: python3 scripts/build_jar.py

      - name: Publish jar release asset
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="orchestrator-tester-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          JAR_PATH="build/orchestrator-tester.jar"
          gh release create "$TAG" "$JAR_PATH" \
            --title "orchestrator-tester ${GITHUB_RUN_ID}" \
            --notes "Automated release for Specmatic orchestrator testing"
          JAR_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/orchestrator-tester.jar"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "jar_url=$JAR_URL" >> "$GITHUB_OUTPUT"

      - name: Trigger orchestrator
        env:
          GH_TOKEN: ${{ secrets.SPECMATIC_GITHUB_TOKEN }}
          ORCHESTRATOR_REPOSITORY: ${{ inputs.orchestrator_repository }}
          ORCHESTRATOR_EVENT_TYPE: ${{ inputs.orchestrator_event_type }}
          ORCHESTRATOR_TEST_EXECUTOR_PATH: ${{ inputs.ORCHESTRATOR_TEST_EXECUTOR_PATH }}
          ENTERPRISE_CHECK_RUN_ID: ${{ steps.pending-check.outputs.check_run_id }}
          ENTERPRISE_CHECK_RUN_URL: ${{ steps.pending-check.outputs.check_run_url }}
          JAR_URL: ${{ steps.release.outputs.jar_url }}
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "Missing SPECMATIC_GITHUB_TOKEN repository secret."
            echo "Add a fine-grained PAT or GitHub App token with access to specmatic/specmatic-tests-orchestrator."
            exit 1
          fi
          python3 - <<'PY'
          import json
          import os

          payload = {
              "event_type": os.environ["ORCHESTRATOR_EVENT_TYPE"],
              "client_payload": {
                  "jar_url": os.environ["JAR_URL"],
                  "enterprise_repository": os.environ["GITHUB_REPOSITORY"],
                  "enterprise_sha": os.environ["GITHUB_SHA"],
                  "enterprise_run_id": os.environ["GITHUB_RUN_ID"],
                  "enterprise_run_attempt": os.environ["GITHUB_RUN_ATTEMPT"],
              },
          }
          enterprise_check_run_id = os.environ.get("ENTERPRISE_CHECK_RUN_ID", "").strip()
          if enterprise_check_run_id:
              payload["client_payload"]["enterprise_check_run_id"] = enterprise_check_run_id
          test_executor_path = os.environ.get("ORCHESTRATOR_TEST_EXECUTOR_PATH", "").strip()
          if test_executor_path:
              payload["client_payload"]["test_executor_path"] = test_executor_path
          print("Repository dispatch payload:")
          print(json.dumps(payload, indent=2, sort_keys=True))
          PY
          if [ -n "${ORCHESTRATOR_TEST_EXECUTOR_PATH:-}" ]; then
            echo "Passing orchestrator manifest override: ${ORCHESTRATOR_TEST_EXECUTOR_PATH}"
          fi
          args=(
            -f "event_type=${ORCHESTRATOR_EVENT_TYPE}"
            -f "client_payload[jar_url]=${JAR_URL}"
            -f "client_payload[enterprise_repository]=${GITHUB_REPOSITORY}"
            -f "client_payload[enterprise_sha]=${GITHUB_SHA}"
            -f "client_payload[enterprise_run_id]=${GITHUB_RUN_ID}"
            -f "client_payload[enterprise_run_attempt]=${GITHUB_RUN_ATTEMPT}"
          )
          if [ -n "${ENTERPRISE_CHECK_RUN_ID:-}" ]; then
            args+=(-f "client_payload[enterprise_check_run_id]=${ENTERPRISE_CHECK_RUN_ID}")
          fi
          if [ -n "${ORCHESTRATOR_TEST_EXECUTOR_PATH:-}" ]; then
            args+=(-f "client_payload[test_executor_path]=${ORCHESTRATOR_TEST_EXECUTOR_PATH}")
          fi
          gh api "repos/${ORCHESTRATOR_REPOSITORY}/dispatches" -X POST "${args[@]}"
