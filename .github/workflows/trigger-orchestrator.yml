name: Build and Trigger Orchestrator

on:
  workflow_dispatch:
    inputs:
      orchestrator_repository:
        description: Repository that hosts the orchestrator workflow
        required: false
        default: specmatic/specmatic-tests-orchestrator
        type: string
      orchestrator_event_type:
        description: repository_dispatch event type to send
        required: false
        default: specmatic-enterprise-jar-ready
        type: string
      ORCHESTRATOR_TEST_EXECUTOR_PATH:
        description: Optional manifest path. Defaults to a synthetic tester manifest unless ENTERPRISE_VERSION is provided.
        required: false
        type: string
      ENTERPRISE_VERSION:
        description: Optional Enterprise selector. Leave blank to use the default dummy jar tester flow.
        required: false
        default: ""
        type: string

jobs:
  build-and-trigger:
    runs-on: ubuntu-latest
    outputs:
      status_context: ${{ steps.pending-status.outputs.status_context }}
      status_url: ${{ steps.pending-status.outputs.status_url }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    permissions:
      statuses: write
      contents: write
    steps:
      - name: Checkout orchestrator-tester
        uses: actions/checkout@v5

      - name: Create pending orchestrator status
        id: pending-status
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          status_context="Specmatic Orchestrator Gate"
          gh api repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA} -X POST             -f state="pending"             -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"             -f description="Waiting for orchestrator tests."             -f context="${status_context}"
          status_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}"
          echo "status_context=$status_context" >> "$GITHUB_OUTPUT"
          echo "status_url=$status_url" >> "$GITHUB_OUTPUT"
          echo "Created pending commit status: $status_url"
          python3 - <<'PY'
          import json
          import os
          import subprocess

          repo = os.environ["GITHUB_REPOSITORY"]
          sha = os.environ["GITHUB_SHA"]
          run_url = f"{os.environ['GITHUB_SERVER_URL']}/{repo}/actions/runs/{os.environ['GITHUB_RUN_ID']}"
          raw = subprocess.check_output(["gh", "api", f"repos/{repo}/commits/{sha}/status"], text=True)
          contexts = {
              status.get("context")
              for status in json.loads(raw).get("statuses", [])
              if str(status.get("context", "")).startswith("Orchestrator Gate for run ")
          }
          for context in sorted(contexts):
              subprocess.check_call(
                  [
                      "gh",
                      "api",
                      f"repos/{repo}/statuses/{sha}",
                      "-X",
                      "POST",
                      "-f",
                      "state=success",
                      "-f",
                      f"target_url={run_url}",
                      "-f",
                      "description=Superseded by Specmatic Orchestrator Gate.",
                      "-f",
                      f"context={context}",
                  ]
              )
          PY
          {
            echo "## Orchestrator Gate for enterprise run ${GITHUB_RUN_ID} attempt ${GITHUB_RUN_ATTEMPT} (pending)"
            echo ""
            echo "- Enterprise run id: ${GITHUB_RUN_ID}"
            echo "- Enterprise run attempt: ${GITHUB_RUN_ATTEMPT}"
            echo "- Correlation key: ${GITHUB_RUN_ID}/${GITHUB_RUN_ATTEMPT}"
            echo "- Status context: ${status_context}"
            echo "- Commit status: [${GITHUB_SHA:0:7}](${status_url})"
            echo "- State: pending"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Trigger orchestrator
        env:
          GH_TOKEN: ${{ secrets.SPECMATIC_GITHUB_TOKEN }}
          ORCHESTRATOR_REPOSITORY: ${{ inputs.orchestrator_repository }}
          ORCHESTRATOR_EVENT_TYPE: ${{ inputs.orchestrator_event_type }}
          ORCHESTRATOR_TEST_EXECUTOR_PATH: ${{ inputs.ORCHESTRATOR_TEST_EXECUTOR_PATH }}
          ENTERPRISE_VERSION: ${{ inputs.ENTERPRISE_VERSION }}
          ENTERPRISE_STATUS_CONTEXT: ${{ steps.pending-status.outputs.status_context }}
          ENTERPRISE_STATUS_URL: ${{ steps.pending-status.outputs.status_url }}
          ENTERPRISE_STATUS_TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          DEFAULT_DUMMY_JAR_URL: https://repo1.maven.org/maven2/junit/junit/4.13.2/junit-4.13.2.jar
          DEFAULT_DUMMY_ENTERPRISE_VERSION: 0.0.0-DUMMY
          DEFAULT_TEST_EXECUTOR_PATH: resources/orchestrator-tester-test-executor.json
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "Missing SPECMATIC_GITHUB_TOKEN repository secret."
            echo "Add a fine-grained PAT or GitHub token with access to specmatic/specmatic-tests-orchestrator."
            exit 1
          fi
          python3 - <<'PY'
          import json
          import os

          enterprise_selector = os.environ.get("ENTERPRISE_VERSION", "").strip()
          test_executor_path = os.environ.get("ORCHESTRATOR_TEST_EXECUTOR_PATH", "").strip()
          jar_url = ""
          enterprise_version = enterprise_selector
          if not enterprise_selector:
              jar_url = os.environ["DEFAULT_DUMMY_JAR_URL"]
              enterprise_version = os.environ["DEFAULT_DUMMY_ENTERPRISE_VERSION"]
              if not test_executor_path:
                  test_executor_path = os.environ["DEFAULT_TEST_EXECUTOR_PATH"]

          payload = {
              "event_type": os.environ["ORCHESTRATOR_EVENT_TYPE"],
              "client_payload": {
                  "enterprise_repository": os.environ["GITHUB_REPOSITORY"],
                  "enterprise_sha": os.environ["GITHUB_SHA"],
                  "enterprise_run_id": os.environ["GITHUB_RUN_ID"],
                  "enterprise_run_attempt": os.environ["GITHUB_RUN_ATTEMPT"],
                  "enterprise_version": enterprise_version,
              },
          }
          if jar_url:
              payload["client_payload"]["jar_url"] = jar_url
          status_context = os.environ.get("ENTERPRISE_STATUS_CONTEXT", "").strip()
          if status_context:
              payload["client_payload"]["enterprise_status_context"] = status_context
          status_target_url = os.environ.get("ENTERPRISE_STATUS_TARGET_URL", "").strip()
          if status_target_url:
              payload["client_payload"]["enterprise_status_target_url"] = status_target_url
          if test_executor_path:
              payload["client_payload"]["test_executor_path"] = test_executor_path
          print("Repository dispatch payload:")
          print(json.dumps(payload, indent=2, sort_keys=True))
          PY
          enterprise_selector="${ENTERPRISE_VERSION:-}"
          test_executor_path="${ORCHESTRATOR_TEST_EXECUTOR_PATH:-}"
          jar_url=""
          enterprise_version="${enterprise_selector}"
          if [ -z "${enterprise_selector}" ]; then
            jar_url="${DEFAULT_DUMMY_JAR_URL}"
            enterprise_version="${DEFAULT_DUMMY_ENTERPRISE_VERSION}"
            if [ -z "${test_executor_path}" ]; then
              test_executor_path="${DEFAULT_TEST_EXECUTOR_PATH}"
            fi
            echo "Using default dummy jar for orchestrator-tester: ${jar_url}"
          else
            echo "Using Enterprise selector for orchestrator resolution: ${enterprise_selector}"
          fi
          if [ -n "${test_executor_path}" ]; then
            echo "Passing orchestrator manifest override: ${test_executor_path}"
          fi
          args=(
            -f "event_type=${ORCHESTRATOR_EVENT_TYPE}"
            -f "client_payload[enterprise_repository]=${GITHUB_REPOSITORY}"
            -f "client_payload[enterprise_sha]=${GITHUB_SHA}"
            -f "client_payload[enterprise_run_id]=${GITHUB_RUN_ID}"
            -f "client_payload[enterprise_run_attempt]=${GITHUB_RUN_ATTEMPT}"
            -f "client_payload[enterprise_version]=${enterprise_version}"
          )
          if [ -n "${jar_url}" ]; then
            args+=(-f "client_payload[jar_url]=${jar_url}")
          fi
          if [ -n "${ENTERPRISE_STATUS_CONTEXT:-}" ]; then
            args+=(-f "client_payload[enterprise_status_context]=${ENTERPRISE_STATUS_CONTEXT}")
          fi
          if [ -n "${ENTERPRISE_STATUS_TARGET_URL:-}" ]; then
            args+=(-f "client_payload[enterprise_status_target_url]=${ENTERPRISE_STATUS_TARGET_URL}")
          fi
          if [ -n "${test_executor_path}" ]; then
            args+=(-f "client_payload[test_executor_path]=${test_executor_path}")
          fi
          gh api "repos/${ORCHESTRATOR_REPOSITORY}/dispatches" -X POST "${args[@]}"

  orchestrator-gate:
    needs: build-and-trigger
    runs-on: ubuntu-latest
    permissions:
      statuses: read
      contents: read
    steps:
      - name: Checkout orchestrator-tester
        uses: actions/checkout@v5

      - name: Wait for orchestrator gate
        env:
          GH_TOKEN: ${{ secrets.SPECMATIC_GITHUB_TOKEN || github.token }}
          STATUS_CONTEXT: ${{ needs.build-and-trigger.outputs.status_context }}
          STATUS_URL: ${{ needs.build-and-trigger.outputs.status_url }}
          ORCHESTRATOR_REPOSITORY: ${{ inputs.orchestrator_repository }}
          GATE_TIMEOUT_SECONDS: "3600"
        run: |
          set -euo pipefail
          python3 scripts/orchestrator_gate_summary.py
