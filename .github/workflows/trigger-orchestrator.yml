name: Build and Trigger Orchestrator

on:
  workflow_dispatch:
    inputs:
      orchestrator_repository:
        description: Repository that hosts the orchestrator workflow
        required: false
        default: specmatic/specmatic-tests-orchestrator
        type: string
      orchestrator_event_type:
        description: repository_dispatch event type to send
        required: false
        default: specmatic-enterprise-jar-ready
        type: string
      ORCHESTRATOR_TEST_EXECUTOR_PATH:
        description: Optional manifest path for orchestrator scenario testing
        required: false
        type: string
      ENTERPRISE_VERSION:
        description: Enterprise version to ask the orchestrator to test
        required: false
        default: 1.12.1-SNAPSHOT
        type: string

jobs:
  build-and-trigger:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    permissions:
      statuses: write
      contents: write
    steps:
      - name: Checkout orchestrator-tester
        uses: actions/checkout@v5

      - name: Create pending orchestrator status
        id: pending-status
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          status_context="Orchestrator Gate for run ${GITHUB_RUN_ID} attempt ${GITHUB_RUN_ATTEMPT}"
          gh api repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA} -X POST             -f state="pending"             -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"             -f description="Waiting for orchestrator tests."             -f context="${status_context}"
          status_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}"
          echo "status_context=$status_context" >> "$GITHUB_OUTPUT"
          echo "status_url=$status_url" >> "$GITHUB_OUTPUT"
          echo "Created pending commit status: $status_url"
          {
            echo "## Orchestrator Gate for enterprise run ${GITHUB_RUN_ID} attempt ${GITHUB_RUN_ATTEMPT} (pending)"
            echo ""
            echo "- Enterprise run id: ${GITHUB_RUN_ID}"
            echo "- Enterprise run attempt: ${GITHUB_RUN_ATTEMPT}"
            echo "- Correlation key: ${GITHUB_RUN_ID}/${GITHUB_RUN_ATTEMPT}"
            echo "- Status context: ${status_context}"
            echo "- Commit status: [${GITHUB_SHA:0:7}](${status_url})"
            echo "- State: pending"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Build jar
        run: python3 scripts/build_jar.py

      - name: Publish jar release asset
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="orchestrator-tester-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          JAR_PATH="build/orchestrator-tester.jar"
          gh release create "$TAG" "$JAR_PATH"             --title "orchestrator-tester ${GITHUB_RUN_ID}"             --notes "Automated release for Specmatic orchestrator testing"
          JAR_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/orchestrator-tester.jar"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "jar_url=$JAR_URL" >> "$GITHUB_OUTPUT"

      - name: Trigger orchestrator
        env:
          GH_TOKEN: ${{ secrets.SPECMATIC_GITHUB_TOKEN }}
          ORCHESTRATOR_REPOSITORY: ${{ inputs.orchestrator_repository }}
          ORCHESTRATOR_EVENT_TYPE: ${{ inputs.orchestrator_event_type }}
          ORCHESTRATOR_TEST_EXECUTOR_PATH: ${{ inputs.ORCHESTRATOR_TEST_EXECUTOR_PATH }}
          ENTERPRISE_VERSION: ${{ inputs.ENTERPRISE_VERSION }}
          ENTERPRISE_STATUS_CONTEXT: ${{ steps.pending-status.outputs.status_context }}
          ENTERPRISE_STATUS_URL: ${{ steps.pending-status.outputs.status_url }}
          JAR_URL: ${{ steps.release.outputs.jar_url }}
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "Missing SPECMATIC_GITHUB_TOKEN repository secret."
            echo "Add a fine-grained PAT or GitHub token with access to specmatic/specmatic-tests-orchestrator."
            exit 1
          fi
          python3 - <<'PY'
          import json
          import os

          payload = {
              "event_type": os.environ["ORCHESTRATOR_EVENT_TYPE"],
              "client_payload": {
                  "jar_url": os.environ["JAR_URL"],
                  "enterprise_repository": os.environ["GITHUB_REPOSITORY"],
                  "enterprise_sha": os.environ["GITHUB_SHA"],
                  "enterprise_run_id": os.environ["GITHUB_RUN_ID"],
                  "enterprise_run_attempt": os.environ["GITHUB_RUN_ATTEMPT"],
                  "enterprise_version": os.environ["ENTERPRISE_VERSION"],
              },
          }
          status_context = os.environ.get("ENTERPRISE_STATUS_CONTEXT", "").strip()
          if status_context:
              payload["client_payload"]["enterprise_status_context"] = status_context
          test_executor_path = os.environ.get("ORCHESTRATOR_TEST_EXECUTOR_PATH", "").strip()
          if test_executor_path:
              payload["client_payload"]["test_executor_path"] = test_executor_path
          print("Repository dispatch payload:")
          print(json.dumps(payload, indent=2, sort_keys=True))
          PY
          if [ -n "${ORCHESTRATOR_TEST_EXECUTOR_PATH:-}" ]; then
            echo "Passing orchestrator manifest override: ${ORCHESTRATOR_TEST_EXECUTOR_PATH}"
          fi
          args=(
            -f "event_type=${ORCHESTRATOR_EVENT_TYPE}"
            -f "client_payload[jar_url]=${JAR_URL}"
            -f "client_payload[enterprise_repository]=${GITHUB_REPOSITORY}"
            -f "client_payload[enterprise_sha]=${GITHUB_SHA}"
            -f "client_payload[enterprise_run_id]=${GITHUB_RUN_ID}"
            -f "client_payload[enterprise_run_attempt]=${GITHUB_RUN_ATTEMPT}"
            -f "client_payload[enterprise_version]=${ENTERPRISE_VERSION}"
          )
          if [ -n "${ENTERPRISE_STATUS_CONTEXT:-}" ]; then
            args+=(-f "client_payload[enterprise_status_context]=${ENTERPRISE_STATUS_CONTEXT}")
          fi
          if [ -n "${ORCHESTRATOR_TEST_EXECUTOR_PATH:-}" ]; then
            args+=(-f "client_payload[test_executor_path]=${ORCHESTRATOR_TEST_EXECUTOR_PATH}")
          fi
          gh api "repos/${ORCHESTRATOR_REPOSITORY}/dispatches" -X POST "${args[@]}"

      - name: Wait for orchestrator gate
        env:
          GH_TOKEN: ${{ github.token }}
          STATUS_CONTEXT: ${{ steps.pending-status.outputs.status_context }}
          GATE_TIMEOUT_SECONDS: "3600"
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          import subprocess
          import sys
          import time

          repo = os.environ["GITHUB_REPOSITORY"]
          sha = os.environ["GITHUB_SHA"]
          context = os.environ["STATUS_CONTEXT"]
          timeout_seconds = int(os.environ.get("GATE_TIMEOUT_SECONDS", "3600"))
          poll_seconds = 15
          started = time.time()
          latest = {}

          while time.time() - started < timeout_seconds:
              raw = subprocess.check_output(
                  ["gh", "api", f"repos/{repo}/commits/{sha}/status"],
                  text=True,
              )
              combined = json.loads(raw)
              matches = [
                  status
                  for status in combined.get("statuses", [])
                  if status.get("context") == context
              ]
              if matches:
                  latest = matches[0]
                  state = str(latest.get("state", "pending"))
                  print(f"Current orchestrator gate state: {state}")
                  if state != "pending":
                      break
              else:
                  print(f"Waiting for status context: {context}")
              time.sleep(poll_seconds)
          else:
              latest = {
                  "state": "timeout",
                  "description": f"Timed out waiting for {context}",
                  "target_url": "",
              }

          state = str(latest.get("state", "unknown"))
          description = str(latest.get("description") or "")
          target_url = str(latest.get("target_url") or "")
          status_url = f"{os.environ['GITHUB_SERVER_URL']}/{repo}/commit/{sha}"

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as summary:
              summary.write("\n")
              summary.write(f"## Orchestrator Gate for enterprise run {os.environ['GITHUB_RUN_ID']} attempt {os.environ['GITHUB_RUN_ATTEMPT']} ({state})\n\n")
              summary.write(f"- Status context: `{context}`\n")
              summary.write(f"- State: `{state}`\n")
              if description:
                  summary.write(f"- Description: {description}\n")
              summary.write(f"- Commit status: [{sha[:7]}]({status_url})\n")
              if target_url:
                  summary.write(f"- Orchestrator run: {target_url}\n")

          if state != "success":
              sys.exit(1)
          PY
