name: Orchestrator Callback

on:
  repository_dispatch:
    types:
      - specmatic-orchestrator-finished

permissions:
  checks: write
  contents: read

jobs:
  receive-callback:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - name: Print callback payload
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          import urllib.request
          from pathlib import Path

          def pretty_json(value: object) -> str:
              return json.dumps(value, indent=2, sort_keys=True, ensure_ascii=False)

          def marker(passed: bool) -> str:
              return "✅" if passed else "❌"

          def md(value: object) -> str:
              text = "" if value is None else str(value)
              return text.replace("|", "\\|").replace("\n", " ").strip()

          def read_path(data: object, path: tuple[str, ...], default: object = "") -> object:
              current = data
              for key in path:
                  if not isinstance(current, dict) or key not in current:
                      return default
                  current = current[key]
              return default if current is None else current

          def first_value(data: object, *paths: tuple[str, ...], default: object = "") -> object:
              for path in paths:
                  value = read_path(data, path, default=None)
                  if value not in (None, ""):
                      return value
              return default

          def github_request(method: str, url: str, token: str, payload: dict[str, object] | None = None) -> dict[str, object]:
              data = None if payload is None else json.dumps(payload).encode("utf-8")
              request = urllib.request.Request(url, data=data, method=method)
              request.add_header("Accept", "application/vnd.github+json")
              request.add_header("Authorization", f"Bearer {token}")
              request.add_header("X-GitHub-Api-Version", "2022-11-28")
              request.add_header("Content-Type", "application/json")
              with urllib.request.urlopen(request, timeout=60) as response:
                  response_body = response.read().decode("utf-8")
                  return json.loads(response_body) if response_body else {}

          event = json.loads(Path(os.environ["GITHUB_EVENT_PATH"]).read_text(encoding="utf-8"))

          client_payload = event.get("client_payload", {})

          event_type = str(event.get("action", "")).strip()
          status = str(client_payload.get("status", "failure")).strip().lower()
          passed = status in {"success", "neutral"}
          result_banner = "PASS" if passed else "FAIL"

          summary_lines = [
              f"# {marker(passed)} Orchestrator callback: {result_banner}",
              "",
              "## Callback Overview",
              "",
              f"- Event: `{md(event_type)}`",
              f"- Status: `{md(status)}`",
              f"- Phase: `{md(client_payload.get('phase', ''))}`",
              f"- Enterprise repo: `{md(client_payload.get('enterprise_repository', ''))}`",
              f"- Enterprise SHA: `{md(client_payload.get('enterprise_sha', ''))}`",
              f"- Enterprise run: `{md(client_payload.get('enterprise_run_id', ''))}` attempt `{md(client_payload.get('enterprise_run_attempt', ''))}`",
              f"- Orchestrator run: `{md(client_payload.get('orchestrator_run_id', ''))}` attempt `{md(client_payload.get('orchestrator_run_attempt', ''))}`",
          ]
          if execution_error := client_payload.get("execution_error"):
              summary_lines.extend(["", "## Execution Error", "", "```text", str(execution_error), "```"])

          summary_json = client_payload.get("summary_json")
          parsed_summary: object = {}
          if summary_json not in (None, ""):
              summary_lines.extend(["", "## Orchestrator Summary"])
              try:
                  parsed_summary = json.loads(summary_json)
              except json.JSONDecodeError:
                  summary_lines.extend(["", "```text"] + str(summary_json).splitlines() + ["```"])
              else:
                  if isinstance(parsed_summary, dict):
                      conclusion = str(first_value(parsed_summary, ("conclusion",), ("status",), default="")).strip().lower()
                      summary_lines.extend([
                          "",
                          "### Totals",
                          "",
                          f"- Conclusion: {marker(conclusion in {'success', 'neutral', 'passed'})} `{md(conclusion or first_value(parsed_summary, ('conclusion',), ('status',), default=''))}`",
                          f"- Sources: `{md(first_value(parsed_summary, ('total_sources',), ('totals', 'sources'), default=''))}`",
                          f"- Passed sources: `{md(first_value(parsed_summary, ('passed_sources',), ('totals', 'passed_sources'), default=''))}`",
                          f"- Failed sources: `{md(first_value(parsed_summary, ('failed_sources',), ('totals', 'failed_sources'), default=''))}`",
                          f"- Tests: `{md(first_value(parsed_summary, ('total',), ('totals', 'tests'), default=''))}`",
                          f"- Passed tests: `{md(first_value(parsed_summary, ('passed_count',), ('totals', 'passed_tests'), default=''))}`",
                          f"- Failed tests: `{md(first_value(parsed_summary, ('failed_count',), ('totals', 'failed_tests'), default=''))}`",
                      ])
                      sources = parsed_summary.get("sources", [])
                      if isinstance(sources, list) and sources:
                          summary_lines.extend([
                              "",
                              "### Sources",
                              "",
                              "| Type | Name | Description | Status | Passed | Failed | Total |",
                              "| --- | --- | --- | --- | ---: | ---: | ---: |",
                          ])
                          for source in sources:
                              if not isinstance(source, dict):
                                  continue
                              source_type = first_value(source, ("type",), ("source", "type"), ("details", "type"), default="")
                              source_name = first_value(source, ("name",), ("source", "name"), ("details", "name"), ("details", "source"), default="")
                              source_description = first_value(source, ("description",), ("source", "description"), ("details", "description"), default="")
                              source_passed = bool(first_value(source, ("passed",), ("run", "passed"), ("details", "passed"), default=False))
                              passed_count = first_value(source, ("passed_count",), ("run", "passed_count"), default="")
                              failed_count = first_value(source, ("failed_count",), ("run", "failed_count"), default="")
                              total = first_value(source, ("total",), ("run", "total"), default="")
                              summary_lines.append(
                                  f"| {md(source_type)} | {md(source_name)} | {md(source_description)} | {marker(source_passed)} {'PASS' if source_passed else 'FAIL'} | {md(passed_count)} | {md(failed_count)} | {md(total)} |"
                              )
                  summary_lines.extend(["", "## Raw summary_json", "", "```json"] + pretty_json(parsed_summary).splitlines() + ["```"])

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as handle:
              handle.write("\n".join(summary_lines) + "\n")

          enterprise_check_run_id = str(client_payload.get("enterprise_check_run_id", "")).strip()
          if not enterprise_check_run_id or enterprise_check_run_id == "null":
              enterprise_sha = str(client_payload.get("enterprise_sha", "")).strip()
              if enterprise_sha:
                  response = github_request(
                      "GET",
                      f"https://api.github.com/repos/{os.environ['GITHUB_REPOSITORY']}/commits/{enterprise_sha}/check-runs",
                      os.environ.get("GITHUB_TOKEN", ""),
                      None,
                  )
                  for check_run in response.get("check_runs", []) if isinstance(response, dict) else []:
                      if not isinstance(check_run, dict):
                          continue
                      if str(check_run.get("name", "")).strip() != "Orchestrator Gate":
                          continue
                      if str(check_run.get("status", "")).strip().lower() == "completed":
                          continue
                      enterprise_check_run_id = str(check_run.get("id", "")).strip()
                      break

          if enterprise_check_run_id and enterprise_check_run_id != "null":
              conclusion = "success" if passed else "failure"
              totals = parsed_summary.get("totals", {}) if isinstance(parsed_summary, dict) else {}
              check_summary = [
                  f"{marker(passed)} Orchestrator callback: {result_banner}",
                  f"Status: {status}",
                  f"Phase: {client_payload.get('phase', '')}",
              ]
              if isinstance(totals, dict) and totals:
                  check_summary.extend([
                      f"Sources: {totals.get('sources', parsed_summary.get('total_sources', '') if isinstance(parsed_summary, dict) else '')}",
                      f"Passed sources: {totals.get('passed_sources', '')}",
                      f"Failed sources: {totals.get('failed_sources', '')}",
                      f"Tests: {totals.get('tests', parsed_summary.get('total', '') if isinstance(parsed_summary, dict) else '')}",
                      f"Passed tests: {totals.get('passed_tests', '')}",
                      f"Failed tests: {totals.get('failed_tests', '')}",
                  ])
              if execution_error not in (None, ""):
                  check_summary.append(f"Execution error: {execution_error}")
              patch_response = github_request(
                  "PATCH",
                  f"https://api.github.com/repos/{os.environ['GITHUB_REPOSITORY']}/check-runs/{enterprise_check_run_id}",
                  os.environ.get("GITHUB_TOKEN", ""),
                  {
                      "status": "completed",
                      "conclusion": conclusion,
                      "details_url": client_payload.get("orchestrator_run_url", ""),
                      "output": {
                          "title": "Orchestrator Gate",
                          "summary": "\n".join(check_summary),
                      },
                  },
              )
              check_url = str(patch_response.get("html_url", "")).strip() if isinstance(patch_response, dict) else ""
              if check_url:
                  with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as handle:
                      handle.write("\n".join([
                          "",
                          "## Completed Orchestrator Gate",
                          "",
                          f"- Result: {marker(passed)} {result_banner}",
                          f"- Check: [Orchestrator Gate]({check_url})",
                          f"- Conclusion: `{conclusion}`",
                      ]) + "\n")
          else:
              print("No pending Orchestrator Gate check found to finalize.")

          print(f"RESULT: {marker(passed)} {result_banner}")
          print("Callback summary")
          print(f"  event_type: {event_type}")
          print(f"  status: {status}")
          print(f"  phase: {client_payload.get('phase', '')}")
          print(f"  enterprise_repository: {client_payload.get('enterprise_repository', '')}")
          print(f"  enterprise_sha: {client_payload.get('enterprise_sha', '')}")
          print(f"  enterprise_run_id: {client_payload.get('enterprise_run_id', '')}")
          print(f"  enterprise_run_attempt: {client_payload.get('enterprise_run_attempt', '')}")
          print(f"  orchestrator_run_url: {client_payload.get('orchestrator_run_url', '')}")
          print(f"  orchestrator_run_id: {client_payload.get('orchestrator_run_id', '')}")
          print(f"  orchestrator_run_attempt: {client_payload.get('orchestrator_run_attempt', '')}")

          execution_error = client_payload.get("execution_error")
          if execution_error not in (None, ""):
              print("  execution_error:")
              print(f"    {execution_error}")

          summary_json = client_payload.get("summary_json")
          if summary_json not in (None, ""):
              print("  summary_json:")
              try:
                  parsed_summary = json.loads(summary_json)
              except json.JSONDecodeError:
                  print("    <invalid JSON>")
                  for line in str(summary_json).splitlines():
                      print(f"    {line}")
              else:
                  for line in pretty_json(parsed_summary).splitlines():
                      print(f"    {line}")

          print("Callback payload (top-level keys):")
          print(f"  {', '.join(sorted(event.keys()))}")

          if status not in {"success", "neutral"}:
              raise SystemExit(1)
          PY
